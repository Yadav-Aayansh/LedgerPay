version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger_pay_db
    environment:
      POSTGRES_USER: noctivagous
      POSTGRES_PASSWORD: noctivagous
      POSTGRES_DB: ledgerpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: